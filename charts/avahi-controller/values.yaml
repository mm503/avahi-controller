# Default values for avahi-controller.

replicaCount: 1

image:
  repository: mm404/avahi-controller
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsUser: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

args:
  - --cleanup-on-exit=false

env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: DBUS_SYSTEM_BUS_ADDRESS
    value: unix:path=/run/dbus/system_bus_socket

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 50m
    memory: 64Mi

terminationGracePeriodSeconds: 30

volumes:
  - name: avahi-hosts
    hostPath:
      path: /etc/avahi/hosts
      type: FileOrCreate
  - name: dbus-socket
    hostPath:
      path: /run/dbus/system_bus_socket
      type: Socket

volumeMounts:
  - name: avahi-hosts
    mountPath: /etc/avahi/hosts
  - name: dbus-socket
    mountPath: /run/dbus/system_bus_socket

nodeSelector:
  avahi-controller: "true"

tolerations:
  - operator: Exists

affinity: {}
