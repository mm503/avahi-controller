name: Release Please

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: mm404/avahi-controller

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o controller-linux-amd64 ./cmd/controller/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o controller-linux-arm64 ./cmd/controller/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images (no push)
        run: |
          docker buildx build --platform linux/amd64 -f Dockerfile.release .
          docker buildx build --platform linux/arm64 -f Dockerfile.release .

  release-please:
    runs-on: ubuntu-latest
    needs: build-check
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Strip v prefix from tag
        id: version
        run: echo "version=$(echo '${{ needs.release-please.outputs.tag_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o controller-linux-amd64 ./cmd/controller/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o controller-linux-arm64 ./cmd/controller/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: mm404
          password: ${{ secrets.DOCKER_HUB_KEY }}

      - name: Build and push per-arch images
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          docker buildx build --platform linux/amd64 -f Dockerfile.release --push -t ${IMAGE}:${VERSION}-amd64 .
          docker buildx build --platform linux/arm64 -f Dockerfile.release --push -t ${IMAGE}:${VERSION}-arm64 .

      - name: Create and push multi-arch manifests
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          docker buildx imagetools create \
            -t ${IMAGE}:${VERSION} \
            -t ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

  update-chart:
    runs-on: ubuntu-latest
    needs: [release-please, docker-release]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update chart appVersion and image tag
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/avahi-controller/Chart.yaml
          sed -i "s/^  tag: .*/  tag: \"${VERSION}\"/" charts/avahi-controller/values.yaml

      - name: Bump chart version
        run: |
          CHART_VERSION=$(grep '^version:' charts/avahi-controller/Chart.yaml | awk '{print $2}')
          NEW_CHART_VERSION=$(echo "$CHART_VERSION" | awk -F. '{$NF = $NF + 1; print}' OFS='.')
          sed -i "s/^version: .*/version: ${NEW_CHART_VERSION}/" charts/avahi-controller/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/avahi-controller/Chart.yaml charts/avahi-controller/values.yaml
          git commit -m "chore(chart): update to app version ${{ needs.release-please.outputs.tag_name }}"
          git push

  helm-release:
    runs-on: ubuntu-latest
    needs: update-chart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
