name: CI

on:
  push:
    branches-ignore: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mm404/avahi-controller

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Get current release version
        id: version
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o controller-linux-amd64 ./cmd/controller/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o controller-linux-arm64 ./cmd/controller/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: mm404
          password: ${{ secrets.DOCKER_HUB_KEY }}

      - name: Set image tag
        id: tag
        run: |
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHA="${GITHUB_SHA:0:7}"
          echo "value=dev-${{ steps.version.outputs.version }}-${BRANCH}-${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push per-arch images
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ steps.tag.outputs.value }}
          docker buildx build --platform linux/amd64 -f Dockerfile.release --push -t ${IMAGE}:${TAG}-amd64 .
          docker buildx build --platform linux/arm64 -f Dockerfile.release --push -t ${IMAGE}:${TAG}-arm64 .

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ steps.tag.outputs.value }}
          docker buildx imagetools create \
            -t ${IMAGE}:${TAG} \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-arm64
